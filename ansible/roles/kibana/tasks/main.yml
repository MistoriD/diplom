---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install reqs for Docker
  apt: 
    name: 
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - python3-pip
      - virtualenv
      - python3.12-venv
      - python3-setuptools
    state: latest 
    update_cache: yes


- name: Add the GPG key for Docker
  shell: 'curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc'

- name: chmod GPG key for Docker
  shell: 'chmod a+r /etc/apt/keyrings/docker.asc'

- name: Information for OS
  ansible.builtin.shell: >
    . /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
  register: os_release

- name: Architecture OS
  ansible.builtin.shell: dpkg --print-architecture
  register: architecture

- name: Make file docker.sources
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ os_release.stdout }}
      Components: stable
      Architectures: {{ architecture.stdout }}
      Signed-By: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: '0644'

- name: Update and install docker
  apt: 
    update_cache: yes
    name: docker-ce
    state: latest

- name: Create env Python
  command: python3 -m venv /opt/venv

- name: Install modules Docker in env
  command: /opt/venv/bin/pip install docker

- name: Wait for Elasticsearch to be ready
  uri:
    url: "http://{{ hostvars['elasticsearch-host'].ansible_host }}:9200"
    method: GET
    status_code: 200
  register: elasticsearch_status
  until: elasticsearch_status.status == 200
  retries: 10
  delay: 10


- name: Create container
  docker_container:
    name: "Kibana"
    image: "kibana:9.3.3"
    ports:
    - "5601:5601"
    env:
        ELASTICSEARCH_HOSTS='["http://{{ hostvars['elasticsearch-host'].ansible_host }}:9200"]'
    state: started
    restart_policy: always

- name: docker container ls -a
  tags: container_ls
  shell: "docker container ls -a"
  register: container_info

- name: docker container ls -a result
  tags: container_ls
  debug:
    msg: "{{container_info.stdout_lines}}"

- name: Wait for Kibana to start (can take 1-2 mins)
  uri:
    url: "http://localhost:5601/status"
    method: GET
    status_code: 200
  register: kibana_status
  until: kibana_status.status == 200
  retries: 12
  delay: 10

- name: Check Kibana logs if still not ready
  shell: "docker logs Kibana"
  register: kibana_logs
  failed_when: false

- name: Show Kibana logs
  debug:
    var: kibana_logs.stdout_lines