---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install reqs for Docker
  apt: 
    name: 
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - python3-pip
      - virtualenv
      - python3.12-venv
      - python3-setuptools
    state: latest 
    update_cache: yes

- name: Add the GPG key for Docker
  shell: 'curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc'

- name: chmod GPG key for Docker
  shell: 'chmod a+r /etc/apt/keyrings/docker.asc'

- name: Information for OS
  ansible.builtin.shell: >
    . /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
  register: os_release

- name: Architecture OS
  ansible.builtin.shell: dpkg --print-architecture
  register: architecture

- name: Make file docker.sources
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ os_release.stdout }}
      Components: stable
      Architectures: {{ architecture.stdout }}
      Signed-By: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: '0644'


- name: Update and install docker
  apt: 
    update_cache: yes
    name: docker-ce
    state: latest

- name: Configure firewall (UFW)
  block:
    - name: Allow SSH through firewall (чтобы не потерять доступ)
      ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow Elasticsearch ports
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - 9200
        - 9300

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

- name: Create env Python
  command: python3 -m venv /opt/venv

- name: Install modules Docker in env
  command: /opt/venv/bin/pip install docker

- name: Create dir for data
  file:
    path: /etc/elasticsearch/data
    state: directory
    owner: 1000
    group: 1000
    mode: 0777

- name: Create container
  docker_container:
    name: "Elasticsearch"
    image: "elasticsearch:9.3.3"
    user: 1000
    volumes:
    - "/etc/elasticsearch/data:/usr/share/elasticsearch/data"
    ports:
    - "9200:9200"
    - "9300:9300"
    env:
        discovery.type: "single-node"
        xpack.security.enabled: "false"
        xpack.security.http.ssl.enabled: "false"
        xpack.security.transport.ssl.enabled: "false"
    state: started
    restart_policy: always

- name: Wait for Elasticsearch to become healthy
  uri:
    url: "http://localhost:9200/_cluster/health"
    method: GET
    status_code: 200
    timeout: 30
  register: health_check
  retries: 10
  delay: 10
  until: health_check.status == 200
  ignore_errors: yes

- name: Check if Elasticsearch is running
  docker_container_info:
    name: Elasticsearch
  register: container_status

- name: Verify container is running
  assert:
    that:
      - container_status.container.State.Status == "running"
      - container_status.container.State.Running == true
    fail_msg: "Elasticsearch container is not running"
    success_msg: "Elasticsearch container is running successfully"

- name: Get container logs if health check failed
  shell: "docker logs Elasticsearch"
  register: container_logs
  when: health_check is failed or container_status.container.State.Status != "running"
  ignore_errors: yes

- name: Display container logs if there was an error
  debug:
    var: container_logs.stdout_lines
  when: health_check is failed or container_status.container.State.Status != "running"

- name: docker container ls -a
  tags: container_ls
  shell: "docker container ls -a"
  register: container_info

- name: docker container ls -a result
  tags: container_ls
  debug:
    msg: "{{container_info.stdout_lines}}"
